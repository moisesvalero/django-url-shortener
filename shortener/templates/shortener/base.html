{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="{% block description %}Acortador de URLs rápido y seguro. Crea enlaces cortos, rastrea clics y simplifica tu presencia digital.{% endblock %}"
    />
    <link
      rel="canonical"
      href="{% block canonical %}{{ request.build_absolute_uri }}{% endblock %}"
    />
    <link
      rel="alternate"
      hreflang="es"
      href="{% block hreflang_es %}{{ request.build_absolute_uri }}{% endblock %}"
    />
    <link
      rel="alternate"
      hreflang="x-default"
      href="{% block hreflang_xdefault %}{{ request.build_absolute_uri }}{% endblock %}"
    />
    <meta
      property="og:type"
      content="{% block og_type %}website{% endblock %}"
    />
    <meta property="og:site_name" content="URL Shortener" />
    <meta
      property="og:title"
      content="{% block og_title %}URL Shortener · moisesvalero{% endblock %}"
    />
    <meta
      property="og:description"
      content="{% block og_description %}Acortador de URLs rápido y seguro. Crea enlaces cortos, rastrea clics y simplifica tu presencia digital.{% endblock %}"
    />
    <meta
      property="og:url"
      content="{% block og_url %}{{ request.build_absolute_uri }}{% endblock %}"
    />
    <meta
      property="og:image"
      content="{% block og_image %}{{ BASE_URL }}{% static 'og-image.svg' %}{% endblock %}"
    />
    <meta
      name="twitter:card"
      content="{% block twitter_card %}summary_large_image{% endblock %}"
    />
    <meta
      name="twitter:title"
      content="{% block twitter_title %}URL Shortener · moisesvalero{% endblock %}"
    />
    <meta
      name="twitter:description"
      content="{% block twitter_description %}Acortador de URLs rápido y seguro. Crea enlaces cortos, rastrea clics y simplifica tu presencia digital.{% endblock %}"
    />
    <meta
      name="twitter:image"
      content="{% block twitter_image %}{{ BASE_URL }}{% static 'og-image.svg' %}{% endblock %}"
    />
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}" />
    <title>{% block title %}URL Shortener{% endblock %} · moisesvalero</title>
    {% block json_ld %}
    <script type="application/ld+json" nonce="{{ request.csp_nonce }}">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "URL Shortener",
        "url": "https://acortador.moisesvalero.es",
        "description": "Acortador de URLs rápido y seguro. Crea enlaces cortos, rastrea clics y simplifica tu presencia digital.",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "All",
        "browserRequirements": "Requires JavaScript",
        "inLanguage": "es",
        "author": {
          "@type": "Person",
          "name": "moisesvalero",
          "url": "https://moisesvalero.es"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        },
        "potentialAction": {
          "@type": "CreateAction",
          "name": "Acortar URL"
        }
      }
    </script>
    {% endblock %}
    <link rel="stylesheet" href="{% static 'output.css' %}" />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="{% static 'fonts/geist-latin.woff2' %}"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="{% static 'fonts/geist-mono-latin.woff2' %}"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="{% static 'fonts/material-symbols.woff2' %}"
      crossorigin
    />
    <script
      src="https://unpkg.com/htmx.org@2.0.4"
      nonce="{{ request.csp_nonce }}"
    ></script>
    <script nonce="{{ request.csp_nonce }}">
      document.addEventListener("click", function (e) {
        var btn = e.target.closest("[data-copy-url]");
        if (!btn) return;
        var url = btn.getAttribute("data-copy-url");
        var original = btn.innerHTML;
        navigator.clipboard
          .writeText(url)
          .then(function () {
            btn.innerHTML =
              '\u00a1Copiado! <span class="material-symbols-outlined">check</span>';
            setTimeout(function () {
              btn.innerHTML = original;
            }, 2000);
          })
          ["catch"](function () {
            btn.innerHTML =
              'Error <span class="material-symbols-outlined">close</span>';
          });
      });
      document.addEventListener("htmx:afterRequest", function (e) {
        if (e.detail.target && e.detail.target.id === "result-card") {
          var form = e.detail.elt;
          if (form && form.tagName === "FORM") form.reset();
        }
      });
    </script>
  </head>
  <body
    class="bg-background text-on-background font-sans antialiased selection:bg-primary-container selection:text-on-primary-container"
  >
    <nav
      class="bg-background/80 backdrop-blur-md fixed top-0 left-0 w-full z-50 h-16 border-b border-white/5"
    >
      <div
        class="flex justify-between items-center w-full px-8 max-w-container-max mx-auto h-full"
      >
        <!-- Brand Logo -->
        <a href="{% url 'home' %}" class="flex items-center gap-2 group">
          <span
            class="font-headline-md text-headline-md font-extrabold text-on-background tracking-tighter hover:text-surface-tint transition-colors duration-300"
          >
            url-shortener
          </span>
          <span
            class="w-1.5 h-1.5 rounded-full bg-surface-tint animate-pulse"
          ></span>
        </a>

        <!-- Navigation Actions -->
        <div class="flex items-center gap-3">
          <!-- Portfolio -->
          <a
            href="https://moisesvalero.es"
            target="_blank"
            rel="noopener noreferrer"
            class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-on-background/80 hover:text-surface-tint hover:bg-white/10 hover:border-surface-tint/30 flex items-center justify-center transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[0_4px_12px_rgba(0,0,0,0.3)]"
            title="Visitar Portfolio"
            aria-label="Portfolio"
          >
            <span class="material-symbols-outlined text-[20px]">language</span>
          </a>

          <!-- LinkedIn -->
          <a
            href="https://www.linkedin.com/in/moisesvalero/"
            target="_blank"
            rel="noopener noreferrer"
            class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 text-on-background/80 hover:text-[#0a66c2] hover:bg-white/10 hover:border-[#0a66c2]/30 flex items-center justify-center transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[0_4px_12px_rgba(0,0,0,0.3)]"
            title="LinkedIn"
            aria-label="LinkedIn"
          >
            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
              <path
                d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"
              />
            </svg>
          </a>

          <!-- GitHub Star -->
          <a
            href="https://github.com/moisesvalero/django-url-shortener"
            target="_blank"
            rel="noopener noreferrer"
            class="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-surface-tint/30 hover:text-surface-tint transition-all duration-300 text-sm font-bold text-on-background hover:-translate-y-0.5 hover:shadow-[0_4px_12px_rgba(171,214,0,0.1)]"
            aria-label="Star on GitHub"
          >
            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
              <path
                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
              />
            </svg>
            <span class="hidden sm:inline">Star on GitHub</span>
            <span
              class="material-symbols-outlined text-[16px] text-surface-tint animate-pulse"
              >star</span
            >
          </a>
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <footer
      class="bg-surface-container-lowest border-t border-white/5 py-12 mt-auto"
    >
      <div
        class="w-full px-8 max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center gap-8"
      >
        <!-- Left Section: Copyright & License Info -->
        <div
          class="flex flex-col items-center md:items-start gap-1.5 text-center md:text-left"
        >
          <p
            class="font-label-md text-label-md text-on-surface-variant opacity-80"
          >
            © {% now "Y" %} moisesvalero. hecho con
            <span class="text-[#ff3b30] animate-pulse mx-0.5">❤️</span> por
            moisesvalero.
          </p>
          <span
            class="text-[10px] uppercase font-bold tracking-wider text-on-surface-variant/40"
            >MIT License</span
          >
        </div>

        <!-- Right Section: Support Action Only -->
        <div class="flex items-center">
          <a
            href="https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=moi6@outlook.com&currency_code=EUR"
            target="_blank"
            rel="noopener noreferrer"
            class="flex items-center gap-2 px-5 py-2.5 rounded-xl border border-surface-tint/20 hover:border-surface-tint text-surface-tint bg-surface-tint/5 hover:bg-surface-tint/10 transition-all duration-300 text-sm font-bold hover:shadow-[0_0_20px_rgba(171,214,0,0.15)] hover:-translate-y-0.5"
          >
            <span class="material-symbols-outlined text-[18px]">favorite</span>
            Apoya al proyecto
          </a>
        </div>
      </div>
    </footer>
  </body>
</html>
