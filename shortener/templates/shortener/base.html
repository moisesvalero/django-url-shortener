{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block description %}Acortador de URLs rápido y seguro. Crea enlaces cortos, rastrea clics y simplifica tu presencia digital.{% endblock %}">
  <link rel="canonical" href="{% block canonical %}{{ request.build_absolute_uri }}{% endblock %}">
  <link rel="alternate" hreflang="es" href="{% block hreflang_es %}{{ request.build_absolute_uri }}{% endblock %}">
  <link rel="alternate" hreflang="x-default" href="{% block hreflang_xdefault %}{{ request.build_absolute_uri }}{% endblock %}">
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  <meta property="og:site_name" content="URL Shortener">
  <meta property="og:title" content="{% block og_title %}URL Shortener · moisesvalero{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Acortador de URLs rápido y seguro. Crea enlaces cortos, rastrea clics y simplifica tu presencia digital.{% endblock %}">
  <meta property="og:url" content="{% block og_url %}{{ request.build_absolute_uri }}{% endblock %}">
  <meta property="og:image" content="{% block og_image %}{{ BASE_URL }}{% static 'og-image.svg' %}{% endblock %}">
  <meta name="twitter:card" content="{% block twitter_card %}summary_large_image{% endblock %}">
  <meta name="twitter:title" content="{% block twitter_title %}URL Shortener · moisesvalero{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}Acortador de URLs rápido y seguro. Crea enlaces cortos, rastrea clics y simplifica tu presencia digital.{% endblock %}">
  <meta name="twitter:image" content="{% block twitter_image %}{{ BASE_URL }}{% static 'og-image.svg' %}{% endblock %}">
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <title>{% block title %}URL Shortener{% endblock %} · moisesvalero</title>
  {% block json_ld %}
  <script type="application/ld+json" nonce="{{ request.csp_nonce }}">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "URL Shortener",
    "url": "https://acortador.moisesvalero.es",
    "description": "Acortador de URLs rápido y seguro. Crea enlaces cortos, rastrea clics y simplifica tu presencia digital.",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "All",
    "browserRequirements": "Requires JavaScript",
    "inLanguage": "es",
    "author": {
      "@type": "Person",
      "name": "moisesvalero",
      "url": "https://moisesvalero.es"
    },
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "EUR"
    },
    "potentialAction": {
      "@type": "CreateAction",
      "name": "Acortar URL"
    }
  }
  </script>
  {% endblock %}
  <link rel="stylesheet" href="{% static 'output.css' %}">
  <link rel="preload" as="font" type="font/woff2" href="{% static 'fonts/geist-latin.woff2' %}" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="{% static 'fonts/geist-mono-latin.woff2' %}" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="{% static 'fonts/material-symbols.woff2' %}" crossorigin>
  <script src="https://unpkg.com/htmx.org@2.0.4" nonce="{{ request.csp_nonce }}"></script>
  <script nonce="{{ request.csp_nonce }}">
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-copy-url]');
      if (!btn) return;
      var url = btn.getAttribute('data-copy-url');
      var original = btn.innerHTML;
      navigator.clipboard.writeText(url).then(function() {
        btn.innerHTML = "\u00a1Copiado! <span class=\"material-symbols-outlined\">check</span>";
        setTimeout(function() { btn.innerHTML = original; }, 2000);
      })["catch"](function() {
        btn.innerHTML = "Error <span class=\"material-symbols-outlined\">close</span>";
      });
    });
    document.addEventListener('htmx:afterRequest', function(e) {
      if (e.detail.target && e.detail.target.id === 'result-card') {
        var form = e.detail.elt;
        if (form && form.tagName === 'FORM') form.reset();
      }
    });
  </script>
</head>
<body class="bg-background text-on-background font-sans antialiased selection:bg-primary-container selection:text-on-primary-container">

  <nav class="bg-background fixed top-0 left-0 w-full z-50 h-16 border-b border-white/5">
    <div class="flex justify-between items-center w-full px-gutter max-w-container-max mx-auto h-full">
      <a href="{% url 'home' %}" class="font-headline-md text-headline-md font-bold text-on-background tracking-tighter">url-shortener</a>
      <div class="hidden md:flex items-center gap-stack-lg">
        {% block nav_links %}{% endblock %}
      </div>
      <button class="md:hidden text-on-background" aria-label="Menú">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="bg-surface-container-lowest border-t border-white/5">
    <div class="w-full py-stack-lg px-gutter flex flex-col md:flex-row justify-between items-center max-w-container-max mx-auto gap-stack-md">
      <div class="flex flex-col items-center md:items-start gap-1">
        <div class="font-label-md text-label-md text-on-background font-bold">url-shortener</div>
        <p class="font-label-md text-label-md text-on-surface-variant opacity-60">© {% now "Y" %} moisesvalero. hecho con cariño.</p>
      </div>
      <div class="flex gap-gutter items-center">
        <a class="text-on-surface-variant font-label-md text-label-md hover:text-on-background transition-colors opacity-80 hover:opacity-100" href="https://moisesvalero.es">portfolio</a>
        <a class="text-on-surface-variant font-label-md text-label-md hover:text-on-background transition-colors opacity-80 hover:opacity-100" href="{% url 'health' %}">status</a>
      </div>
    </div>
  </footer>

</body>
</html>
