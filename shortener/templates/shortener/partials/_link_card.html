<div class="bg-surface-container border border-white/5 rounded-xl p-stack-md flex flex-col md:flex-row items-center justify-between gap-gutter group hover:border-white/20 transition-all animate-fade-in">
  <div class="flex flex-col gap-1 w-full md:w-auto">
    <a href="/{{ link.short_code }}" class="font-mono-label text-mono-label text-primary-container text-lg md:text-xl hover:underline">{{ BASE_URL }}/{{ link.short_code }}</a>
    <span class="text-on-surface-variant/50 font-body-md text-body-md truncate max-w-xs md:max-w-md">{{ link.original_url }}</span>
  </div>
  <div class="flex items-center gap-stack-md w-full md:w-auto justify-end">
    <div class="bg-surface-container-highest px-3 py-1.5 rounded flex items-center gap-2">
      <span class="material-symbols-outlined text-sm text-on-surface-variant">visibility</span>
      <span class="font-label-sm text-label-sm text-on-surface-variant">{{ link.clicks_count }} clicks</span>
    </div>
    <button onclick="navigator.clipboard.writeText(this.dataset.url);this.innerHTML='¡Copiado! <span class=\'material-symbols-outlined\'>check</span>';setTimeout(()=>this.innerHTML='Copiar <span class=\'material-symbols-outlined\'>content_copy</span>',2000)"
            data-url="{{ BASE_URL }}/{{ link.short_code }}"
            class="flex items-center gap-2 border border-white/10 hover:bg-white/5 px-5 py-2.5 rounded-lg font-label-md text-label-md transition-all active:scale-95 text-on-background">
      Copiar
      <span class="material-symbols-outlined">content_copy</span>
    </button>
  </div>
</div>
